<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Image Display Test</title>
    <script src="script.js" defer></script>
    </head>
<body>
    <div class="img-display-bg"></div>
    <div class="img-container">
         <img src="./digital-version/MS-BME-2-2026-03-ACCS_Page_1.jpg" alt="Image of a BME Program Flyer" id="img-file"/>
    </div>
    <div class="version-navigation">
        <button id="digital-version" class="version-btn" disabled><i class="go-digital"></i>Digital Version</button>
         <button id="print-version" class="version-btn"><i class="go-print"></i>Print Version</button>
    </div>
    <div class="pages-navigation">
        <button id="prevDigital" class="prev-pages-btn" class="Digital-Btn" disabled></button>
        <button id="nextDigital" class="next-pages-btn" class="Digital-Btn"></button>
        <button id="prevPrint" class="prev-pages-btn" class="Print-Btn" hidden></button>
        <button id="nextPrint" class="next-pages-btn" class="Print-Btn" hidden></button>
    </div>
    <div class="file-selection">
        <button id="BME1" class="BME" class="Masters">  </button>
        <button id="BME2" class="BME" class="Masters"> </button>
        <button id="BME3" class="BME" class="Masters"> </button>

        <button id="CLSE1" class="CLSE" class="Masters"> </button>
        <button id="CLSE2" class="CLSE" class="Masters"> </button>
    </div>
</body>
</html>
